# edgemap remap configuration
# Generated by: edgemap create-config
#
# ── Remap ──────────────────────────────────────
#   [button]
#   remap = "target"
#
#   Standard targets: cross  circle  square  triangle
#                     l1  l2  l3  r1  r2  r3
#                     options  create  ps
#                     dpad_up  dpad_down  dpad_left  dpad_right
#                     touchpad
#
#   Stick targets:    ls_up  ls_down  ls_left  ls_right
#                     rs_up  rs_down  rs_left  rs_right
#
#   Special targets:  block       — disable the button entirely
#                     combo       — modifier key combinations (see below)
#                     <macro_name> — timed key sequence (see below)
#
# ── Turbo (hold-to-repeat) ─────────────────────
#   [button]
#   remap = "cross"
#   turbo = true
#   turbo_interval_ms = 80      # toggle interval (default: 100)
#   turbo_delay_ms = 200        # delay before turbo starts (default: 0)
#
# ── Combo (modifier + key → output) ────────────
#   [modifier]
#   remap = "combo"
#   [[modifier.combos]]         # array of tables
#   key = "cross"
#   output = "circle"
#
# ── Macro (timed key sequence) ─────────────────
#   [button]
#   remap = "my_macro"
#   [macros.my_macro]
#   mode = "hold"               # "hold" loops while pressed, "single" runs once
#   sequence = [
#     { key = "cross",  press_ms = 0,   release_ms = 200 },
#     { key = "circle", press_ms = 100, release_ms = 300 },
#   ]
#
# ── Touchpad Split ─────────────────────────────
#   [touchpad]
#   remap = "split"
#   [touchpad_left]
#   remap = "dpad_left"
#   [touchpad_right]
#   remap = "dpad_right"
#
# ── Global Options ──────────────────────────────
#   output_device = "dualsense"    # "auto", "dualsense", or "dualshock4"

version = 2

# Face Buttons
[cross]
remap = "cross"
[circle]
remap = "circle"
[square]
remap = "square"
[triangle]
remap = "triangle"

# Shoulder Buttons + Triggers
[l1]
remap = "l1"
[r1]
remap = "r1"
[l2]
remap = "l2"
[r2]
remap = "r2"

# Stick Buttons
[l3]
remap = "l3"
[r3]
remap = "r3"

# System Buttons
[create]
remap = "create"
[options]
remap = "options"
[ps]
remap = "ps"
[touchpad]
remap = "touchpad"

# D-Pad
[dpad_up]
remap = "dpad_up"
[dpad_down]
remap = "dpad_down"
[dpad_left]
remap = "dpad_left"
[dpad_right]
remap = "dpad_right"

# DualSense Edge — Back Paddles + Function Keys
[left_paddle]
remap = "l1"
[right_paddle]
remap = "r1"
[left_fn]
remap = "create"
[right_fn]
remap = "options"
